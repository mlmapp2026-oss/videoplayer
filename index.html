<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

.video-container{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

iframe{
position:absolute;
top:-60px;
left:0;
width:100%;
height:calc(100vh + 60px);
border:none;
}
</style>

<script>
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});
</script>

</head>

<body>

<div class="video-container">

<iframe 
src="https://drive.google.com/file/d/1V5vB3aAIeEyrUthITWA9zD9lD-nSydIx/preview"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

</div>

</body>
</html>
